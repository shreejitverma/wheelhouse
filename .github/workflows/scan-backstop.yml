name: scan-backstop

# The primary keep-current path. On a schedule (and on demand), scan the whole
# fleet, run deterministic target-side stale pending-contributor cleanup, safely
# reuse a uniquely trusted machine-soft-closed card (or open a new card) for
# anything that needs a decision, REFRESH an open
# `needs-decision` card whose target materially changed or whose card render
# version is stale, publish a held card whose auto-triage path is no longer
# available, make a hidden state-only activity-stamp edit when target activity
# advanced without another body write, queue advisory auto triage for eligible
# PR-review or issue-triage cards whose current revision lacks a cache, and
# close cards whose target is merged/closed, plus pure pending cards whose open
# target no longer needs a maintainer decision in two adjacent conclusive
# scheduled runs - including owner/maintainer/bot-authored targets that the scan author
# filter leaves out and conflicted PR-review targets that moved to needs-rebase -
# so the queue reflects current state and self-heals. The ingest event path still
# upserts on dispatch, but the hourly reconcile is what keeps cards fresh;
# running it hourly is safe because reconcile writes only when a material,
# render-version, held-publish, activity-stamp, or auto-triage-cache trigger
# fires and is a full no-op otherwise (see reconcile.py / render_card.upsert_card,
# AGENTS.md "Card refresh").

on:
  schedule:
    - cron: "17 * * * *" # hourly, best-effort
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  actions: write

concurrency:
  group: wheelhouse-backstop
  queue: max
  cancel-in-progress: false

jobs:
  reconcile:
    if: github.event_name == 'schedule' || github.actor == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install deps
        run: pip install --quiet pyyaml

      # Current open cards in THIS repo - default token. This also supplies the
      # optional, read-only CI security-summary cache; an unreadable list falls
      # back to an empty cache so the fleet scan still runs and re-analyzes.
      - name: List open cards
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! gh api --paginate --slurp \
            "repos/{owner}/{repo}/issues?state=open&per_page=100" \
            | jq '[.[][] | select(has("pull_request") | not) | {number, body: (.body // ""), updated_at: (.updated_at // ""), author: (.user.login // ""), comments: (.comments // 0), labels: [(.labels // [])[] | {name: .name}], title: (.title // "")}]' \
            > cards.json.tmp; then
            echo "::warning::Could not read the optional CI security-summary cache; scanning without it"
            rm -f cards.json.tmp
            printf '[]\n' > cards.json
          else
            mv cards.json.tmp cards.json
          fi

      # Cross-repo scan reads fleet state, may approve provably-safe fork-CI
      # runs, may post rebase nudges, and may remind or close stale
      # pending-contributor PRs, so this step requires FLEET_TOKEN with Actions
      # write scope.
      - name: Scan the fleet
        env:
          GH_TOKEN: ${{ secrets.FLEET_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: python scripts/wheelhouse_core.py scan --cards cards.json > scan.json

      - name: Claim auto-merge decision cards
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          WHEELHOUSE_AUTOMERGE_HAS_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
        run: python scripts/auto_merge.py claim scan.json cards.json

      - name: Validate auto-merge decision cards
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: python scripts/auto_merge.py validate automerge-claims.json

      # Scan-time auto-merge (shipped code default OFF, enabled fleet-wide by
      # this repository's config; strict subset of the manual merge gate).
      # Merges are cross-repo writes, so this step needs FLEET_TOKEN, and
      # it reads the persisted per-card behavior verdict from cards.json (a local
      # file, no token needed to read it). Its separate default-token credential
      # persists the pre-merge audit intent and any proven history-only workflow
      # manual-merge hold; the resolved decision record and ledger stay in the
      # default-token "Record auto-merges" step below.
      - name: Auto-merge eligible PRs
        env:
          GH_TOKEN: ${{ secrets.FLEET_TOKEN }}
          WHEELHOUSE_CARD_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          WHEELHOUSE_AUTOMERGE_HAS_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
        run: python scripts/auto_merge.py act scan.json automerge-valid-claims.json cards.json

      # Durable audit trail + resolved decision record for every auto-merge, plus
      # default-token verification/retry of any manual-merge hold before claim
      # release. This is THIS repo's bookkeeping, never FLEET_TOKEN.
      - name: Record auto-merges
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: python scripts/auto_merge.py record automerge.json automerge-valid-claims.json

      # Reconcile (create, trusted reuse, refresh, activity-reflect, close) in THIS repo -
      # default token, so backstop activity never re-triggers the handler.
      - name: Reconcile the queue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          WHEELHOUSE_AUTO_TRIAGE_HAS_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
        run: python scripts/reconcile.py scan.json cards.json automerge.json

      # Track per-repo consecutive scan failures in a dedicated (closed) ledger
      # issue in THIS repo, and fail the run loudly if a fleet repo has been dark
      # (ok:false) for several scans in a row - so a persistently-unreadable repo
      # cannot hide behind an otherwise-green scheduled run. This is THIS repo's
      # own bookkeeping, so it uses the default token, never FLEET_TOKEN. It runs
      # last and `always()` so it never skips reconcile and fails open on its own
      # I/O errors.
      - name: Check fleet-scan health
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: python scripts/wheelhouse_core.py scan-health scan.json
