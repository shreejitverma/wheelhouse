name: Wheelhouse decision (machine)
description: >-
  Internal schema for the decision cards Wheelhouse creates automatically. You do
  not normally open this by hand - cards are machine-rendered by render_card.py.
  Its only job is to let issue-ops/parser recognise the "Your decision" section
  as a checkboxes field and return it as {selected, unselected}. Held
  pending-triage cards intentionally render a placeholder under that heading
  with no checkbox lines until auto triage publishes them.
title: "[repo#number] decision"
labels:
  - needs-decision
body:
  - type: markdown
    attributes:
      value: >-
        This card is driven by GitHub Actions. Tick exactly one box, or reply
        with a slash-command. Only the repository owner can drive the decision.
  - type: checkboxes
    id: decision
    attributes:
      # NOTE: this label MUST stay in sync with the "### Your decision" heading
      # that render_card.py emits - issue-ops/parser matches sections to fields
      # by exact heading text. The options below are the full union across card
      # kinds; the parser reads the ACTUAL ticked lines from the card body, so
      # this list is only for schema validity, not for matching.
      # Non-checkbox actions like comment, decline, and request-changes are
      # intentionally absent from these checkbox options.
      # comment and request-changes require slash-command text; decline can
      # carry a slash-command reason or fall back to its default label reason.
      label: Your decision
      options:
        - label: Merge it
        - label: Approve the CI run (security-gated)
        - label: Close / decline
        - label: Investigate - deep code-grounded review (leaves this card open)
        - label: Hold - I'll handle this manually
