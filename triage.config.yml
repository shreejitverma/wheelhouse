# triage.config.yml
# =============================================================================
# THE one file you edit to own this machine.
#
# Portability note: the OWNER is NOT set here. Every workflow derives the owner
# from `github.repository_owner` at runtime, so this file works unchanged on any
# account that forks or "Use this template"s the repo. List only repo *names*
# (no "owner/" prefix) - they are resolved under your account/org.
#
# After editing this file and adding the FLEET_TOKEN secret, your triage machine
# is live. See README.md for the full setup checklist.
# =============================================================================

# The fleet: the repositories you maintain and want triaged.
# Replace these annotated placeholders with your own repos.
repos:
  - name: lavish-axi               # repo name only (resolved under your owner)
    # Exact name of a required status check that gates "is this PR allowed to
    # merge". For lavish-axi this is the "raised via no-mistakes" contribution
    # gate. Set to null if you have no such gate. When set, a PR is never shown
    # as merge-ready until this check passes.
    compliance_check: "PR must be raised via no-mistakes"
    # Substrings that identify your *test* / CI checks. A PR is "tests green"
    # only when every check whose name contains one of these passes. lavish-axi
    # runs a `build-and-test (<os>)` matrix across ubuntu/macos/windows.
    test_check_patterns: ["build-and-test"]
    # Optional per-repo extras:
    merge_method: squash           # squash | merge | rebase (default: squash)
    #                              # used when you approve a "Merge it" decision

  # All repos below share the same contribution gate: the `no-mistakes-required.yml`
  # workflow runs a job named "PR must be raised via no-mistakes" on every PR to
  # main, so that exact string is each one's compliance_check. test_check_patterns
  # below are substrings of each repo's real CI test-job check names (verified
  # against the live workflows and Actions run history). merge_method is omitted,
  # so each defaults to squash.
  - name: gnhf
    # ci.yml runs a `build-and-test` matrix (ubuntu/macos/windows-latest).
    compliance_check: "PR must be raised via no-mistakes"
    test_check_patterns: ["build-and-test"]

  - name: firstmate
    # ci.yml ("CI") runs Lint shell scripts / Behavior tests / Repo invariants;
    # "Behavior tests" is the test suite (lint/invariants excluded, mirroring how
    # no-mistakes excludes its format/vet "check" job).
    compliance_check: "PR must be raised via no-mistakes"
    test_check_patterns: ["Behavior tests"]

  - name: no-mistakes
    # ci.yml runs `test` (matrix os) + `e2e` (and a format/vet `check` job we skip).
    compliance_check: "PR must be raised via no-mistakes"
    test_check_patterns: ["test (", "e2e"]

  - name: axi
    # axi-sdk-js-ci.yml runs a `build-and-test` job (path-filtered to the JS SDK).
    compliance_check: "PR must be raised via no-mistakes"
    test_check_patterns: ["build-and-test"]

  - name: chrome-devtools-axi
    # ci.yml runs a single `build-and-test` job.
    compliance_check: "PR must be raised via no-mistakes"
    test_check_patterns: ["build-and-test"]

  - name: gh-axi
    # ci.yml runs a single `build-and-test` job.
    compliance_check: "PR must be raised via no-mistakes"
    test_check_patterns: ["build-and-test"]

# Optional GitHub login allowed to drive decisions, in addition to the repo
# owner. Leave empty to use the repository owner (github.repository_owner).
maintainer: ""

# Phase-2 LLM side-job. Leave false to run the fully deterministic machine with
# only FLEET_TOKEN. Set true AND add the CLAUDE_CODE_OAUTH_TOKEN secret (from
# `claude setup-token`, a Claude subscription token - NOT an API key) to enable
# `deep-review` (label `needs-deep-review` -> Claude reviews the target and
# comments back). Inert until both conditions are met.
deep_review: false

# Natural-language decisions. Leave false to keep the queue fully deterministic
# (checkbox + slash-command only). Set true AND add the CLAUDE_CODE_OAUTH_TOKEN
# secret (same Claude subscription token as deep_review) to let the decision
# handler route a plain-English owner comment on a card through Claude: it MAPS
# the comment to an action ("merge it" -> merge), answers a question, or asks you
# to clarify. The LLM only proposes a structured intent - the deterministic
# executor still performs (and guards) any action. Inert until both are met.
nl_decisions: true

# Whether the scheduled backstop also opens decision cards for open *issues*
# that have no linked PR (in addition to PRs that need your call). Phase-1
# default is PRs only (high signal); flip to true once you want issue triage in
# the queue, or rely on deep-review (phase 2) for issue triage.
card_issues: false
